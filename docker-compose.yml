version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - STORAGE_BACKEND=mongodb
      - MONGODB_URI=mongodb://mongo:27017
      - QUEUE_BACKEND=redis
      - REDIS_URL=redis://redis:6379/0
      - USE_PLAYWRIGHT=true
      - MAX_CONCURRENT_CRAWLS=10
      - RATE_LIMIT_RPS=2
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/app
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data:

searxng:
  image: searxng/searxng:latest
  ports:
    - "8080:8080"
  volumes:
    - ./searxng:/etc/searxng
  environment:
    - SEARXNG_BASE_URL=http://localhost:8080
